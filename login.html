<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rasa Nusantara Cirebon</title>
    <link rel="stylesheet" href="css/pages/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="batik-pattern"></div>
            <div class="welcome-content">
                <h1>Rasa Nusantara</h1>
                <p class="subtitle">Jelajahi Kekayaan Kuliner Cirebon</p>
                <div class="feature-list">
                    <div class="feature-item">
                        <span class="icon">🍜</span>
                        <span>Katalog Makanan Lengkap</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">📍</span>
                        <span>Lokasi & Sejarah</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🏛️</span>
                        <span>Asal Usul Kuliner</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-box">
                <div class="logo-section">
                    <div class="logo-circle">
                        <span class="logo-text">RN</span>
                    </div>
                    <h2>Selamat Datang</h2>
                    <p>Masuk untuk menjelajahi kuliner khas Cirebon</p>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <span class="eye-icon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Ingat Saya</span>
                        </label>
                        <a href="#" class="forgot-password">Lupa Password?</a>
                    </div>

                    <button type="submit" class="btn-login">Masuk</button>
                    
                    <div class="divider">
                        <span>atau</span>
                    </div>

                    <button type="button" class="btn-demo" id="demoLogin">
                        <span class="icon">🚀</span>
                        Coba Demo
                    </button>
                </form>

                <div class="login-footer">
                    <p>Demo Credentials:</p>
                    <div class="demo-info">
                        <span><strong>Username:</strong> admin / user</span>
                        <span><strong>Password:</strong> cirebon123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/pages/auth.js"></script>
</body>
</html>
